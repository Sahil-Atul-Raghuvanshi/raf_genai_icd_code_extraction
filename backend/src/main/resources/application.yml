server:
  port: 9090

spring:
  application:
    name: raf-icd-backend
  
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 100MB
  
  # CORS Configuration
  web:
    cors:
      allowed-origins: "http://localhost:4000"
      allowed-methods: "*"
      allowed-headers: "*"

# Python AI Service Configuration
python:
  service:
    url: http://localhost:8500
    extract-endpoint: /extract-icd
    timeout: 300000  # 5 minutes timeout

# Logging
logging:
  level:
    root: INFO
    com.raf: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
